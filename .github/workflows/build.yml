name: Build Complete Bridge IPK

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUNDLE_GDBSERVER: true
      BUNDLE_GDBLIBS: true
      PACKAGE_NAME: org.webosbrew.bridge-64to32
      PACKAGE_ARCH: aarch64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip xz-utils wget jq

    - name: Download ares-cli-rs
      uses: robinraju/release-downloader@v1
      with:
        repository: "webosbrew/ares-cli-rs"
        latest: true
        fileName: "ares-package_*_amd64.deb"
        out-file-path: "temp"

    - name: Download Manifest Generator
      uses: robinraju/release-downloader@v1
      with:
        repository: "webosbrew/dev-toolbox-cli"
        latest: true
        fileName: "webosbrew-toolbox-gen-manifest_*.deb"
        out-file-path: "temp"

    - name: Install webOS CLI
      run: sudo apt-get -yq install ./temp/*.deb

    - name: Download latest buildroot-nc4 toolchains
      run: |
        API_URL="https://api.github.com/repos/cscd98/buildroot-nc4/releases/latest"
        ASSETS_JSON="$(curl -sSL "$API_URL")"

        for NAME in "aarch64-webos-linux-gnu_sdk-buildroot-x86_64" "arm-webos-linux-gnueabi_sdk-buildroot-x86_64"; do
          URL="$(echo "$ASSETS_JSON" | jq -r ".assets[] | select(.name | startswith(\"$NAME\")) | .browser_download_url" | head -n1)"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Failed to find asset for $NAME"
            exit 1
          fi
          FILE="${NAME}.tar.xz"
          echo "Downloading $URL -> $FILE"
          curl -sSL "$URL" -o "$FILE"
          tar -xf "$FILE"
        done

    - name: Build gles-bridge
      env:
        CC_32_PATH: ${{ github.workspace }}/arm-webos-linux-gnueabi_sdk-buildroot/bin
        CC_64_PATH: ${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/bin
        SYSROOT_32: ${{ github.workspace }}/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot
        SYSROOT_64: ${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot
        PROXY_INSTALL_PATH: /media/developer/apps/usr/palm/applications/${PACKAGE_NAME}/service/gles_proxy
      run: |
        make \
          CC_32_PATH="$CC_32_PATH" \
          CC_64_PATH="$CC_64_PATH" \
          SYSROOT_32="$SYSROOT_32" \
          SYSROOT_64="$SYSROOT_64" \
          PROXY_INSTALL_PATH="$PROXY_INSTALL_PATH"
        make tests

    - name: Package GLES artifacts
      id: package
      run: |
        PKG_NAME="gles-bridge-${GITHUB_REF_NAME:-${GITHUB_SHA}}"
        mkdir -p dist/gles/service dist/gles/lib64

        cp out/aarch64/external_test_64 dist/gles/
        cp tests/deps/loop.mp3 dist/gles/
        cp out/armv7a/gles_proxy dist/gles/service/

        cp out/aarch64/libEGL.so.1 dist/gles/lib64/
        cp out/aarch64/libGLESv2.so.2 dist/gles/lib64/
        cp out/aarch64/libgles_bridge_core.so dist/gles/lib64/
        cp out/aarch64/libwayland-client.so.0 dist/gles/lib64/
        if [ -f out/aarch64/libwayland-egl.so.1 ]; then
          cp out/aarch64/libwayland-egl.so.1 dist/gles/lib64/
        fi
        tar -czf dist/webos-64to32-bridge-gles.tar.gz -C dist/gles .
        echo "pkg=dist/webos-64to32-bridge-gles.tar.gz" >> "$GITHUB_OUTPUT"

    - name: Prepare IPK folder
      run: |
        mkdir -p dist/ipk/lib
        mkdir -p dist/ipk/lib/alsa-lib
        mkdir -p dist/ipk/lib/pulseaudio
        mkdir -p dist/ipk/bin
        mkdir -p dist/ipk/service
        mkdir -p dist/rel
        mkdir -p dist/debug

    - name: Copy core glibc files
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/lib
        DST=dist/ipk/lib
        cp -av \
          $SRC/ld-linux-aarch64.so.1 \
          $SRC/libBrokenLocale.so.1 \
          $SRC/libanl.so.1 \
          $SRC/libc.so.6 \
          $SRC/libdl.so.2 \
          $SRC/libm.so.6 \
          $SRC/libnsl.so.1 \
          $SRC/libnss_compat.so.2 \
          $SRC/libnss_dns.so.2 \
          $SRC/libnss_files.so.2 \
          $SRC/libpthread.so.0 \
          $SRC/libresolv.so.2 \
          $SRC/librt.so.1 \
          $SRC/libudev.so.1.6.3 \
          $SRC/libutil.so.1 \
          $DST/
        if [ -f $SRC/libmvec.so.1 ]; then
        cp -av \
          $SRC/libmvec.so.1 \
          $DST/
        fi

    - name: Copy dependency usr/libraries (retroarch)
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/usr/lib
        DST=dist/ipk/lib
        cp -av \
          $SRC/libz.so.1 \
          $SRC/libz.so.1.3.2 \
          $SRC/libasound.so.2 \
          $SRC/libasound.so.2.0.0 \
          $SRC/libbz2.so.1 \
          $SRC/libbz2.so.1.0.8 \
          $SRC/libffi.so.8 \
          $SRC/libffi.so.8.1.4 \
          $SRC/libfontconfig.so.1 \
          $SRC/libfontconfig.so.1.16.0 \
          $SRC/libfreetype.so.6 \
          $SRC/libfreetype.so.6.20.6 \
          $SRC/libhelpers.so.2 \
          $SRC/libhelpers.so.2.0.0 \
          $SRC/libpng16.so.16 \
          $SRC/libpng16.so.16.57.0 \
          $SRC/libpulse.so* \
          $SRC/libpulse-simple.so* \
          $SRC/libsndfile.so.1 \
          $SRC/libsndfile.so.1.0.37 \
          $SRC/libwayland-cursor.so.0 \
          $SRC/libwayland-cursor.so.0.22.0 \
          $SRC/libwayland-egl.so.1 \
          $SRC/libwayland-egl.so.1.22.0 \
          $SRC/libwayland-client.so.0.22.0 \
          $SRC/libxkbcommon.so.0 \
          $SRC/libxkbcommon.so.0.13.1 \
          $DST/
        cp -av \
          $SRC/pulseaudio/libpulsecommon* \
          $DST/pulseaudio
        if [ -f $SRC/alsa-lib/libasound_module_pcm_pulse.so ]; then
          cp -avR \
            $SRC/alsa-lib \
            $DST/alsa-lib
        fi
        cp -avR $SRC/pulse-15.0 $DST/pulse-15.0
        ln -s libudev.so.1.6.3 $DST/libudev.so.1

    - name: Copy dependency usr/libraries (SDL2)
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/usr/lib
        DST=dist/ipk/lib
        cp -av \
          $SRC/libpbnjson_c.so.2 \
          $SRC/libpbnjson_c.so.2.15.0 \
          $SRC/liburiparser.so.1 \
          $SRC/liburiparser.so.1.2.0 \
          $SRC/libyajl.so.2 \
          $SRC/libyajl.so.2.1.0 \
        $DST/

    - name: Copy dependency usr/libraries (retroarch cores)
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/usr/lib
        DST=dist/ipk/lib
        cp -av \
          $SRC/libcrypto.so.3 \
          $SRC/libcurl.so.4 \
          $SRC/libcurl.so.4.8.0 \
          $SRC/libssl.so.3 \
          $SRC/libstdc++.so.6 \
          $SRC/libstdc++.so.6.0.33 \
          $SRC/libusb-1.0.so.0 \
          $SRC/libusb-1.0.so.0.5.0 \
          $DST/

    - name: Copy dependency libraries (kodi)
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/lib
        DST=dist/ipk/lib
        cp -av \
          $SRC/libgcc_s.so.1 \
          $SRC/libatomic.so.1 \
          $SRC/libatomic.so.1.2.0 \
          $DST/
        if [ -f $SRC/libcrypt.so.1]; then
          cp -avR $SRC/libcrypt.so.1 $DST/
        fi

    - name: Copy dependency usr/libraries (kodi)
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/usr/lib
        DST=dist/ipk/lib
        cp -av \
          $SRC/libdrm.so.2 \
          $SRC/libdrm.so.2.131.0 \
          $SRC/libglib-2.0.so.0 \
          $SRC/libglib-2.0.so.0.8600.5 \
          $SRC/libpcre2-8.so.0 \
          $SRC/libpcre2-8.so.0.15.0 \
          $DST/

    - name: Copy optional gdb libs
      if: env.BUNDLE_GDBLIBS == 'true'
      run: |
        SRC=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot/usr/lib
        LIBDST=dist/ipk/lib
        cp -av \
          $SRC/libexpat.so* \
          $SRC/libgmp.so* \
          $SRC/libgobject-2.0* \
          $SRC/libmpfr.so* \
          $SRC/libncursesw.so* \
          $SRC/libreadline.so* \
          $SRC/libtinfo.so* \
          $LIBDST/

    - name: Copy optional gdbserver
      if: env.BUNDLE_GDBSERVER == 'true'
      run: |
        BIN=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/debug-root/usr/bin
        BINDST=dist/ipk/bin
        cp -av \
          $BIN/gdbserver \
          $BINDST/
        patchelf --set-interpreter /media/developer/apps/usr/palm/applications/${PACKAGE_NAME}/lib/ld-linux-aarch64.so.1 $BINDST/gdbserver

    - name: Build fake 64-bit libSegFault.so
      env:
        CC_64_PATH: ${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/bin
      run: |
        echo "void foo(){}" > dummy.c
        "${CC_64_PATH}/aarch64-webos-linux-gnu-gcc" -shared -fPIC dummy.c -o dist/ipk/lib/libSegFault.so

    - name: Fix WAYLAND CLIENT STUB
      run: |
        cd dist/ipk/lib
        mv libwayland-client.so.0.22.0 libwayland-client-real.so.0.22.0
        ln -s libwayland-client-real.so.0 libwayland-client-real.so
        ln -s libwayland-client-real.so.0.22.0 libwayland-client-real.so.0
        patchelf --set-soname libwayland-client-real.so.0 libwayland-client-real.so.0.22.0

    - name: Fix RUNPATH/SONAME
      run: |
        patchelf --set-rpath '$ORIGIN/pulseaudio' dist/ipk/lib/libpulse.so.0.24.0
        patchelf --set-rpath '$ORIGIN/pulseaudio' dist/ipk/lib/libpulse-simple.so.0.1.1
        patchelf --set-rpath '$ORIGIN' dist/ipk/lib/libfreetype.so.6.20.6

    - name: Copy gles-bridge bin and lib64
      run: |
        cp -av dist/gles/external_test_64 dist/ipk/
        cp -av dist/gles/loop.mp3 dist/ipk/
        cp -av dist/gles/service/* dist/ipk/service/
        cp -av dist/gles/lib64/* dist/ipk/lib/

    - name: Clone (SDL-webOS)
      run: |
        git clone -b abifix https://github.com/cscd98/SDL-webOS.git

    - name: Configure (SDL-webOS)
      run: |
        cd SDL-webOS
        cmake -B build -S . \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/share/buildroot/toolchainfile.cmake \
          -DCMAKE_BUILD_TYPE=Release -DWEBOS=ON -DSDL_OFFSCREEN=OFF -DSDL_DISKAUDIO=OFF \
          -DSDL_DUMMYAUDIO=OFF -DSDL_DUMMYVIDEO=OFF -DSDL_KMSDRM=OFF -DSDL_VENDOR_INFO="webOS Backport" \
          -DSDL_WEBOS_BROKEN_ABI=OFF -DSDL_WEBOS_HAVE_LIBHELPER=OFF

    - name: Build (SDL-webOS)
      run: |
        cd SDL-webOS
        cmake --build build/ --config Release --verbose --parallel

    - name: Copy dependency (SDL-webOS)
      run: |
        SRC=SDL-webOS/build
        DST=dist/ipk/lib
        cp -av \
          $SRC/libSDL2-2.0.so \
          $SRC/libSDL2-2.0.so.0 \
          $SRC/libSDL2-2.0.so.0.3000.12 \
          $DST/

    - name: Inject version into appinfo.json
      if: github.ref_type == 'tag'
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "Using version: $VERSION"
        sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" dist/ipk/appinfo.json

    - name: Build IPK
      run: |
        ares-package -A arm dist/ipk -o .

    - name: Rename IPK (tag build)
      if: github.ref_type == 'tag'
      run: |
        mv *.ipk "dist/rel/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_ARCH }}_${{ github.ref_name }}.ipk"

    - name: Rename IPK (non-tag build)
      if: github.ref_type != 'tag'
      run: |
        mv *.ipk "dist/rel/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_ARCH }}.ipk"

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v7
      with:
        name: webos-64to32-bridge-ipk
        path: "dist/rel/*.ipk"
        archive: false

    - name: Upload GLES artifact
      uses: actions/upload-artifact@v7
      with:
        name: webos-64to32-bridge-gles
        path: "dist/webos-64to32-bridge-gles.tar.gz"
        archive: false

    - name: Generate Manifest (tag build)
      if: github.ref_type == 'tag'
      shell: bash
      run: |
        webosbrew-gen-manifest -o dist/rel/${{ env.PACKAGE_NAME }}.manifest.json \
          -p dist/rel/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_ARCH }}_${{ github.ref_name }}.ipk \
          -i https://github.com/webosbrew/webos-bridge-64to32/blob/main/dist/ipk/icon.png \
          -l https://github.com/webosbrew/webos-bridge-64to32

    - name: Build gles-bridge (debug)
      if: github.ref_type != 'tag'
      env:
        CC_32_PATH: ${{ github.workspace }}/arm-webos-linux-gnueabi_sdk-buildroot/bin
        CC_64_PATH: ${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/bin
        SYSROOT_32: ${{ github.workspace }}/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot
        SYSROOT_64: ${{ github.workspace }}/aarch64-webos-linux-gnu_sdk-buildroot/aarch64-webos-linux-gnu/sysroot
        PROXY_INSTALL_PATH: /media/developer/apps/usr/palm/applications/${PACKAGE_NAME}/service/gles_proxy
      run: |
        make clean
        make \
          CC_32_PATH="$CC_32_PATH" \
          CC_64_PATH="$CC_64_PATH" \
          SYSROOT_32="$SYSROOT_32" \
          SYSROOT_64="$SYSROOT_64" \
          PROXY_INSTALL_PATH="$PROXY_INSTALL_PATH" \
          DEBUG=1 DEBUG_TO_LOGFILE=1 DEBUG_VERBOSE=1 DEBUG_SHADERS=1 DEBUG_OPCODES=1 DEBUG_WAYLAND=1
        make tests

    - name: Package GLES artifacts (debug)
      if: github.ref_type != 'tag'
      run: |
        mkdir -p dist/gles-debug/service dist/gles-debug/lib64

        cp out/aarch64/external_test_64 dist/gles-debug/
        cp tests/deps/loop.mp3 dist/gles-debug/
        cp out/armv7a/gles_proxy dist/gles-debug/service/

        cp out/aarch64/libEGL.so.1 dist/gles-debug/lib64/
        cp out/aarch64/libGLESv2.so.2 dist/gles-debug/lib64/
        cp out/aarch64/libgles_bridge_core.so dist/gles-debug/lib64/
        cp out/aarch64/libwayland-client.so.0 dist/gles-debug/lib64/
        if [ -f out/aarch64/libwayland-egl.so.1 ]; then
          cp out/aarch64/libwayland-egl.so.1 dist/gles-debug/lib64/
        fi
  
    - name: Copy gles-bridge bin and lib64 (debug)
      if: github.ref_type != 'tag'
      run: |
        cp -av dist/gles-debug/service/* dist/ipk/service/
        cp -av dist/gles-debug/lib64/* dist/ipk/lib/

    - name: Build IPK (debug)
      if: github.ref_type != 'tag'
      run: |
        ares-package -A arm dist/ipk -o .

    - name: Rename IPK (non-tag debug build)
      if: github.ref_type != 'tag'
      run: |
        mv *.ipk \
          dist/debug/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_ARCH }}_debug.ipk

    - name: Upload IPK artifact (debug)
      if: github.ref_type != 'tag'
      uses: actions/upload-artifact@v7
      with:
        name: webos-64to32-bridge-debug-ipk
        path: "dist/debug/*.ipk"
        archive: false

    - name: Create GitHub Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/rel/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_ARCH }}_${{ github.ref_name }}.ipk
          dist/webos-64to32-bridge-gles.tar.gz
          dist/rel/${{ env.PACKAGE_NAME }}.manifest.json
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
